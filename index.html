<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Pick 'Em Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sports Pick 'Em Game</h1>
            <p class="subtitle">Pick the winner for each matchup</p>
        </header>

        <main>
            <div class="filter-controls">
                <h3>Filter Games</h3>
                <label class="filter-checkbox">
                    <input type="checkbox" id="filter-nfl" checked>
                    <span>NFL</span>
                </label>
                <label class="filter-checkbox">
                    <input type="checkbox" id="filter-college" checked>
                    <span>College Football</span>
                </label>
            </div>
            
            <div id="loading-container" class="loading-container" style="display: none;">
                <div class="loading-spinner"></div>
                <p>Loading matchups...</p>
            </div>
            <div id="matchups-container"></div>
            
            <div class="picks-summary" id="picks-summary">
                <h2>Your Picks</h2>
                <div id="picks-list">
                    <p class="no-picks">No picks made yet. Start selecting winners!</p>
                </div>
                <div class="button-container">
                    <button id="submit-picks" class="submit-btn" disabled>Submit All Picks</button>
                    <button id="download-picks" class="download-btn" disabled>Download Picks Summary</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
