<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Pick 'Em Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sports Pick 'Em Game</h1>
            <p class="subtitle">Pick the winner for each matchup</p>
        </header>

        <main>
            <div id="matchups-container"></div>
            
            <div class="picks-summary">
                <h2>Your Picks</h2>
                <div id="picks-list">
                    <p class="no-picks">No picks made yet. Start selecting winners!</p>
                </div>
                <button id="submit-picks" class="submit-btn" disabled>Submit All Picks</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
